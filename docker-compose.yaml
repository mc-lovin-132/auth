services:
  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  auth-redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped 
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    ports:
      - "${REDIS_PORT:-6379}:6379" 
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env   

  auth:
    build: .
    container_name: auth
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
    networks:
      - internal
      - ext-net
    ports:
      - "${PORT}:${PORT}"

networks:
  internal:
    driver: bridge
    internal: true   
  ext-net:
    external: true
    name: ext-net
    
volumes:
  postgres_data:
  redis_data: